
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisitaPRO — Gestão de Visitas em Campo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        function closeModal() {
            // Close the modal on both edit and create views
            document.getElementById('modalOverlay').classList.remove('open');
            document.getElementById('modalOverlay').style.opacity = '0';
            document.getElementById('modalOverlay').style.pointerEvents = 'none';
            location.reload();  // Refresh the page after closing modal
        }
    </script>
</head>
<body>

<header>
    <div class="logo">Visita<span>PRO</span></div>
</header>

<div id="modalOverlay" class="modal-overlay">
    <div class="modal">
        <button onclick="closeModal()">✕</button>
        <!-- Modal Content -->
    </div>
</div>

</body>
</html>
