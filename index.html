<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VisitaPRO — Gestão de Visitas em Campo</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --surface2: #1e2230;
    --surface3: #252a3a;
    --border: #2a3050;
    --accent: #4f8ef7;
    --accent2: #7c5cbf;
    --green: #27c47b;
    --yellow: #f5c542;
    --orange: #f07c3a;
    --red: #e84c6a;
    --purple: #a578f5;
    --text: #e8ecf4;
    --text2: #8892a4;
    --text3: #545d72;
    --radius: 12px;
    --radius-sm: 8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  /* HEADER */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 58px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .header-actions { display: flex; gap: 10px; align-items: center; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 16px; border-radius: var(--radius-sm); border: none;
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #3a7de8; transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .btn-danger { background: var(--red); color: white; }
  .btn-danger:hover { background: #c93d58; }
  .stats-bar { display: flex; gap: 6px; }
  .stat-chip {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 12px;
    font-size: 0.78rem; color: var(--text2);
  }
  .stat-chip b { color: var(--text); font-weight: 600; }

  /* LAYOUT */
  .app { display: flex; height: calc(100vh - 58px); margin-top: 58px; }

  /* SIDEBAR */
  .sidebar {
    width: 360px; min-width: 360px; background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-header {
    padding: 16px; border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 10px;
  }
  .sidebar-header h2 { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; }
  .search-box {
    position: relative;
  }
  .search-box input {
    width: 100%; padding: 9px 12px 9px 36px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
    outline: none; transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-box::before {
    content: '🔍'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    font-size: 0.8rem; pointer-events: none;
  }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn {
    padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--text2); font-size: 0.75rem; cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn.active, .filter-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }

  /* CLIENT LIST */
  .client-list { flex: 1; overflow-y: auto; padding: 8px; }
  .client-list::-webkit-scrollbar { width: 4px; }
  .client-list::-webkit-scrollbar-track { background: transparent; }
  .client-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .client-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px;
    margin-bottom: 8px; cursor: pointer; transition: all 0.2s;
    position: relative; overflow: hidden;
  }
  .client-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  }
  .client-card:hover { border-color: var(--accent); transform: translateX(2px); }
  .client-card.selected { border-color: var(--accent); background: var(--surface3); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .client-name { font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700; }
  .status-badge {
    font-size: 0.7rem; font-weight: 600; padding: 3px 9px;
    border-radius: 20px; white-space: nowrap; flex-shrink: 0;
  }
  .card-info { margin-top: 8px; display: flex; flex-direction: column; gap: 3px; }
  .card-info-row { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: var(--text2); }
  .card-info-row .icon { font-size: 0.85rem; }
  .card-actions { margin-top: 10px; display: flex; gap: 6px; }
  .card-btn {
    flex: 1; padding: 6px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--text2); font-size: 0.75rem;
    cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .card-btn:hover { background: var(--surface3); color: var(--text); }
  .card-btn.maps { border-color: var(--green); color: var(--green); }
  .card-btn.maps:hover { background: rgba(39,196,123,0.1); }
  .card-btn.edit { border-color: var(--accent); color: var(--accent); }
  .card-btn.edit:hover { background: rgba(79,142,247,0.1); }
  .card-btn.del { border-color: var(--red); color: var(--red); }
  .card-btn.del:hover { background: rgba(232,76,106,0.1); }

  /* STATUS COLORS */
  .s-interessado { background: rgba(245,197,66,0.15); color: var(--yellow); border-color: var(--yellow); }
  .client-card.s-interessado::before { background: var(--yellow); }
  .s-visitado { background: rgba(79,142,247,0.15); color: var(--accent); border-color: var(--accent); }
  .client-card.s-visitado::before { background: var(--accent); }
  .s-agendado { background: rgba(165,120,245,0.15); color: var(--purple); border-color: var(--purple); }
  .client-card.s-agendado::before { background: var(--purple); }
  .s-comprou { background: rgba(39,196,123,0.15); color: var(--green); border-color: var(--green); }
  .client-card.s-comprou::before { background: var(--green); }
  .s-naointeressado { background: rgba(232,76,106,0.15); color: var(--red); border-color: var(--red); }
  .client-card.s-naointeressado::before { background: var(--red); }
  .s-retornar { background: rgba(240,124,58,0.15); color: var(--orange); border-color: var(--orange); }
  .client-card.s-retornar::before { background: var(--orange); }
  .s-outro { background: rgba(136,146,164,0.15); color: var(--text2); border-color: var(--text3); }
  .client-card.s-outro::before { background: var(--text3); }

  /* MAP */
  #map { flex: 1; z-index: 1; }
  .leaflet-container { background: #e8e0d8 !important; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    z-index: 2000; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; width: 100%; max-width: 520px; max-height: 90vh;
    overflow-y: auto; padding: 28px;
    transform: translateY(20px); transition: transform 0.3s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal::-webkit-scrollbar { width: 4px; }
  .modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .modal-title {
    font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800;
    margin-bottom: 6px;
  }
  .modal-subtitle { color: var(--text2); font-size: 0.85rem; margin-bottom: 22px; }
  .form-group { margin-bottom: 16px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
  input, select, textarea {
    width: 100%; padding: 10px 14px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    outline: none; transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }
  textarea { resize: vertical; min-height: 80px; }
  .loc-preview {
    margin-top: 8px; padding: 10px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-size: 0.8rem; color: var(--text2);
    display: flex; justify-content: space-between; align-items: center;
  }
  .loc-coords { font-family: monospace; font-size: 0.78rem; color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }
  .picking-hint {
    text-align: center; padding: 12px; margin-bottom: 16px;
    background: rgba(79,142,247,0.08); border: 1px dashed var(--accent);
    border-radius: var(--radius-sm); font-size: 0.82rem; color: var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  /* TOAST */
  .toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 16px;
    font-size: 0.85rem; display: flex; align-items: center; gap: 8px;
    min-width: 260px; animation: slideIn 0.3s ease;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
  }
  @keyframes slideIn { from { transform: translateX(100%); opacity:0 } to { transform: translateX(0); opacity:1 } }
  .toast.success { border-left: 3px solid var(--green); }
  .toast.error { border-left: 3px solid var(--red); }
  .toast.info { border-left: 3px solid var(--accent); }

  /* POPUP MAP */
  .leaflet-popup-content-wrapper {
    background: var(--surface) !important; border: 1px solid var(--border) !important;
    border-radius: var(--radius) !important; box-shadow: 0 8px 30px rgba(0,0,0,0.5) !important;
    color: var(--text) !important;
  }
  .leaflet-popup-tip { background: var(--surface) !important; }
  .popup-name { font-family: 'Syne', sans-serif; font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
  .popup-info { font-size: 0.8rem; color: var(--text2); margin-bottom: 2px; }
  .popup-actions { margin-top: 8px; display: flex; gap: 6px; }
  .popup-btn {
    flex: 1; padding: 6px 8px; border-radius: 6px; border: none;
    font-size: 0.75rem; cursor: pointer; font-weight: 500; text-align: center;
    text-decoration: none; display: block;
  }
  .popup-btn-maps { background: var(--green); color: white; }
  .popup-btn-edit { background: var(--accent); color: white; }
  .popup-btn-del { background: var(--red); color: white; }

  /* EMPTY STATE */
  .empty-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 20px; text-align: center; color: var(--text3);
  }
  .empty-state .emoji { font-size: 2.5rem; margin-bottom: 12px; }
  .empty-state p { font-size: 0.85rem; line-height: 1.5; }

  /* MAP CONTROLS */
  .map-fab {
    position: absolute; bottom: 24px; right: 24px; z-index: 500;
    display: flex; flex-direction: column; gap: 8px;
  }
  .fab-btn {
    width: 46px; height: 46px; border-radius: 50%; border: none;
    background: var(--accent); color: white; font-size: 1.2rem;
    cursor: pointer; box-shadow: 0 4px 20px rgba(79,142,247,0.4);
    transition: all 0.2s; display: flex; align-items: center; justify-content: center;
  }
  .fab-btn:hover { transform: scale(1.1); }
  .fab-btn.locate { background: var(--green); box-shadow: 0 4px 20px rgba(39,196,123,0.4); }

  /* MAP INFO BOX */
  .map-info {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    z-index: 500; background: rgba(22,25,33,0.95); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 16px; font-size: 0.78rem; color: var(--text2);
    pointer-events: none;
  }

  /* MOBILE */
  @media (max-width: 700px) {
    .sidebar { width: 100%; min-width: unset; position: fixed; bottom: 0; left: 0; right: 0; z-index: 800; height: 50vh; border-right: none; border-top: 1px solid var(--border); }
    .app { flex-direction: column; }
    #map { height: 50vh; }
    .stats-bar { display: none; }
    .form-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Visita<span>PRO</span></div>
  <div class="stats-bar" id="statsBar"></div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="exportData()">📤 Exportar</button>
    <button class="btn btn-primary" onclick="openModal()">＋ Nova Visita</button>
  </div>
</header>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>Clientes Cadastrados</h2>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar cliente..." oninput="renderList()">
      </div>
      <div class="filter-row" id="filterRow">
        <button class="filter-btn active" data-filter="todos" onclick="setFilter('todos',this)">Todos</button>
        <button class="filter-btn" data-filter="interessado" onclick="setFilter('interessado',this)">🟡 Interessado</button>
        <button class="filter-btn" data-filter="visitado" onclick="setFilter('visitado',this)">🔵 Visitado</button>
        <button class="filter-btn" data-filter="agendado" onclick="setFilter('agendado',this)">🟣 Agendado</button>
        <button class="filter-btn" data-filter="comprou" onclick="setFilter('comprou',this)">🟢 Comprou</button>
        <button class="filter-btn" data-filter="naointeressado" onclick="setFilter('naointeressado',this)">🔴 Não Int.</button>
        <button class="filter-btn" data-filter="retornar" onclick="setFilter('retornar',this)">🟠 Retornar</button>
      </div>
    </div>
    <div class="client-list" id="clientList"></div>
  </div>

  <div style="flex:1;position:relative;">
    <div id="map"></div>
    <div class="map-info" id="mapInfo">Clique no mapa para adicionar uma visita</div>
    <div class="map-fab">
      <button class="fab-btn locate" onclick="locateMe()" title="Minha localização">📍</button>
      <button class="fab-btn" onclick="openModal()" title="Nova visita">＋</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Nova Visita</div>
    <div class="modal-subtitle">Preencha os dados do cliente e clique no mapa para definir a localização.</div>

    <div id="pickingHint" class="picking-hint" style="display:none;">
      🗺️ Clique no mapa para marcar a localização do cliente
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Nome do Cliente *</label>
        <input type="text" id="f_nome" placeholder="Ex: João Silva" required>
      </div>
      <div class="form-group">
        <label>Telefone</label>
        <input type="tel" id="f_tel" placeholder="(11) 99999-9999">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Quantidade de Estudas</label>
        <input type="number" id="f_estudas" placeholder="0" min="0">
      </div>
      <div class="form-group">
        <label>Status *</label>
        <select id="f_status">
          <option value="interessado">🟡 Interessado</option>
          <option value="visitado">🔵 Visitado</option>
          <option value="agendado">🟣 Visita Agendada</option>
          <option value="comprou">🟢 Já Comprou</option>
          <option value="naointeressado">🔴 Não Interessado</option>
          <option value="retornar">🟠 Retornar</option>
          <option value="outro">⚪ Outro</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Endereço (opcional)</label>
      <input type="text" id="f_endereco" placeholder="Rua, número, bairro...">
    </div>

    <div class="form-group">
      <label>Observações</label>
      <textarea id="f_obs" placeholder="Anotações sobre a visita, próximos passos..."></textarea>
    </div>

    <div class="form-group">
      <label>📍 Localização no Mapa</label>
      <button class="btn btn-ghost" onclick="startPicking()" style="width:100%;justify-content:center;">
        🗺️ Definir localização clicando no mapa
      </button>
      <div class="loc-preview" id="locPreview">
        <span>Nenhuma localização definida</span>
        <span class="loc-coords" id="locCoords"></span>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveClient()">💾 Salvar Visita</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'visitapro_clients';
let clients = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let editingId = null;
let currentFilter = 'todos';
let pickingMode = false;
let tempLat = null, tempLng = null;
let markers = {};

// ─── STATUS CONFIG ───────────────────────────────────────────────────────────
const STATUS = {
  interessado:    { label: '🟡 Interessado',     color: '#f5c542', cls: 's-interessado' },
  visitado:       { label: '🔵 Visitado',         color: '#4f8ef7', cls: 's-visitado' },
  agendado:       { label: '🟣 Visita Agendada',  color: '#a578f5', cls: 's-agendado' },
  comprou:        { label: '🟢 Já Comprou',        color: '#27c47b', cls: 's-comprou' },
  naointeressado: { label: '🔴 Não Interessado',  color: '#e84c6a', cls: 's-naointeressado' },
  retornar:       { label: '🟠 Retornar',          color: '#f07c3a', cls: 's-retornar' },
  outro:          { label: '⚪ Outro',              color: '#8892a4', cls: 's-outro' },
};

// ─── MAP INIT ────────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: false }).setView([-15.78, -47.93], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19,
}).addTo(map);

L.control.zoom({ position: 'topright' }).addTo(map);

map.on('click', (e) => {
  if (!pickingMode) {
    openModalAtCoord(e.latlng.lat, e.latlng.lng);
  } else {
    setCoords(e.latlng.lat, e.latlng.lng);
    stopPicking();
  }
});

// ─── MARKER ICON ─────────────────────────────────────────────────────────────
function makeIcon(status) {
  const c = STATUS[status]?.color || '#8892a4';
  const svg = `<svg width="34" height="44" viewBox="0 0 34 44" xmlns="http://www.w3.org/2000/svg">
    <path d="M17 0C7.6 0 0 7.6 0 17c0 9.4 17 27 17 27s17-17.6 17-27C34 7.6 26.4 0 17 0z" fill="${c}"/>
    <circle cx="17" cy="17" r="8" fill="white" opacity="0.9"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    iconSize: [34, 44], iconAnchor: [17, 44], popupAnchor: [0, -44],
    className: ''
  });
}

// ─── RENDER ALL MARKERS ───────────────────────────────────────────────────────
function renderMarkers() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  clients.forEach(c => {
    if (c.lat && c.lng) {
      const m = L.marker([c.lat, c.lng], { icon: makeIcon(c.status) })
        .addTo(map)
        .bindPopup(buildPopup(c));
      markers[c.id] = m;
    }
  });
}

function buildPopup(c) {
  const gmLink = `https://www.google.com/maps?q=${c.lat},${c.lng}`;
  const st = STATUS[c.status];
  return `<div style="min-width:200px;">
    <div class="popup-name">${c.nome}</div>
    <span class="status-badge ${st.cls}" style="font-size:0.7rem;padding:2px 8px;border-radius:20px;">${st.label}</span>
    ${c.tel ? `<div class="popup-info" style="margin-top:8px;">📞 ${c.tel}</div>` : ''}
    ${c.estudas ? `<div class="popup-info">📦 ${c.estudas} estudas</div>` : ''}
    ${c.endereco ? `<div class="popup-info">📍 ${c.endereco}</div>` : ''}
    ${c.obs ? `<div class="popup-info" style="margin-top:4px;font-style:italic;">"${c.obs}"</div>` : ''}
    <div class="popup-info" style="margin-top:6px;font-family:monospace;font-size:0.72rem;color:#545d72;">${c.lat.toFixed(5)}, ${c.lng.toFixed(5)}</div>
    <div class="popup-actions">
      <a href="${gmLink}" target="_blank" class="popup-btn popup-btn-maps">🗺️ Google Maps</a>
      <button onclick="editClient('${c.id}')" class="popup-btn popup-btn-edit">✏️ Editar</button>
      <button onclick="deleteClient('${c.id}')" class="popup-btn popup-btn-del">🗑️</button>
    </div>
  </div>`;
}

// ─── RENDER LIST ─────────────────────────────────────────────────────────────
function renderList() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  let filtered = clients.filter(c => {
    const matchSearch = c.nome.toLowerCase().includes(search) ||
      (c.tel||'').includes(search) || (c.endereco||'').toLowerCase().includes(search);
    const matchFilter = currentFilter === 'todos' || c.status === currentFilter;
    return matchSearch && matchFilter;
  });

  const list = document.getElementById('clientList');

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="emoji">🗺️</div>
      <p>Nenhuma visita encontrada.<br>Clique em <b>+ Nova Visita</b> ou clique no mapa.</p>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(c => {
    const st = STATUS[c.status];
    return `<div class="client-card ${st.cls}" onclick="focusClient('${c.id}')">
      <div class="card-top">
        <div class="client-name">${c.nome}</div>
        <span class="status-badge ${st.cls}">${st.label}</span>
      </div>
      <div class="card-info">
        ${c.tel ? `<div class="card-info-row"><span class="icon">📞</span>${c.tel}</div>` : ''}
        ${c.estudas ? `<div class="card-info-row"><span class="icon">📦</span>${c.estudas} estudas</div>` : ''}
        ${c.endereco ? `<div class="card-info-row"><span class="icon">📍</span>${c.endereco}</div>` : ''}
        ${c.obs ? `<div class="card-info-row" style="color:#545d72;font-style:italic;"><span class="icon">💬</span>${c.obs.substring(0,60)}${c.obs.length>60?'...':''}</div>` : ''}
        ${c.lat ? `<div class="card-info-row"><span class="icon">🌐</span><span style="font-family:monospace;font-size:0.75rem;">${c.lat.toFixed(4)}, ${c.lng.toFixed(4)}</span></div>` : ''}
      </div>
      <div class="card-actions">
        ${c.lat ? `<button class="card-btn maps" onclick="openGoogleMaps('${c.id}',event)">🗺️ Maps</button>` : ''}
        ${c.lat ? `<button class="card-btn maps" onclick="copyLink('${c.id}',event)" style="border-color:#27c47b;color:#27c47b;">🔗 Link</button>` : ''}
        <button class="card-btn edit" onclick="editClient('${c.id}',event)">✏️ Editar</button>
        <button class="card-btn del" onclick="deleteClient('${c.id}',event)">🗑️</button>
      </div>
    </div>`;
  }).join('');

  updateStats();
}

// ─── STATS ───────────────────────────────────────────────────────────────────
function updateStats() {
  const bar = document.getElementById('statsBar');
  const total = clients.length;
  const comprou = clients.filter(c=>c.status==='comprou').length;
  const agendado = clients.filter(c=>c.status==='agendado').length;
  bar.innerHTML = `
    <div class="stat-chip">Total: <b>${total}</b></div>
    <div class="stat-chip">Compraram: <b>${comprou}</b></div>
    <div class="stat-chip">Agendados: <b>${agendado}</b></div>
  `;
}

// ─── FILTER ──────────────────────────────────────────────────────────────────
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

// ─── FOCUS CLIENT ─────────────────────────────────────────────────────────────
function focusClient(id) {
  const c = clients.find(x=>x.id===id);
  if (!c) return;
  if (c.lat && c.lng) {
    map.flyTo([c.lat, c.lng], 16, { duration: 1 });
    setTimeout(() => markers[id]?.openPopup(), 1100);
  }
}

// ─── MODAL ───────────────────────────────────────────────────────────────────
function openModal(lat, lng) {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Nova Visita';
  document.getElementById('f_nome').value = '';
  document.getElementById('f_tel').value = '';
  document.getElementById('f_estudas').value = '';
  document.getElementById('f_status').value = 'interessado';
  document.getElementById('f_endereco').value = '';
  document.getElementById('f_obs').value = '';
  tempLat = lat || null;
  tempLng = lng || null;
  updateLocPreview();
  document.getElementById('modalOverlay').classList.add('open');
}

function openModalAtCoord(lat, lng) {
  openModal(lat, lng);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  stopPicking();
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function startPicking() {
  document.getElementById('pickingHint').style.display = 'block';
  document.getElementById('modalOverlay').classList.remove('open');
  pickingMode = true;
  document.getElementById('mapInfo').textContent = '📍 Clique no mapa para definir a localização';
  map.getContainer().style.cursor = 'crosshair';
}

function stopPicking() {
  pickingMode = false;
  document.getElementById('mapInfo').textContent = 'Clique no mapa para adicionar uma visita';
  map.getContainer().style.cursor = '';
  if (tempLat) document.getElementById('modalOverlay').classList.add('open');
}

function setCoords(lat, lng) {
  tempLat = lat; tempLng = lng;
  updateLocPreview();
}

function updateLocPreview() {
  const preview = document.getElementById('locPreview');
  const coords = document.getElementById('locCoords');
  if (tempLat && tempLng) {
    preview.querySelector('span').textContent = '✅ Localização definida';
    coords.textContent = `${tempLat.toFixed(5)}, ${tempLng.toFixed(5)}`;
  } else {
    preview.querySelector('span').textContent = 'Nenhuma localização definida';
    coords.textContent = '';
  }
}

// ─── SAVE ────────────────────────────────────────────────────────────────────
function saveClient() {
  const nome = document.getElementById('f_nome').value.trim();
  if (!nome) { toast('Nome é obrigatório!', 'error'); return; }

  const client = {
    id: editingId || Date.now().toString(),
    nome,
    tel: document.getElementById('f_tel').value.trim(),
    estudas: document.getElementById('f_estudas').value.trim(),
    status: document.getElementById('f_status').value,
    endereco: document.getElementById('f_endereco').value.trim(),
    obs: document.getElementById('f_obs').value.trim(),
    lat: tempLat,
    lng: tempLng,
    updatedAt: new Date().toISOString(),
  };

  if (editingId) {
    const idx = clients.findIndex(c=>c.id===editingId);
    if (idx !== -1) clients[idx] = client;
    toast(`✅ "${nome}" atualizado!`, 'success');
  } else {
    clients.unshift(client);
    toast(`✅ "${nome}" cadastrado!`, 'success');
  }

  save();
  closeModal();
  renderList();
  renderMarkers();
  if (client.lat) {
    setTimeout(() => {
      map.flyTo([client.lat, client.lng], 16, { duration: 1.2 });
      setTimeout(() => markers[client.id]?.openPopup(), 1300);
    }, 300);
  }
}

// ─── EDIT ─────────────────────────────────────────────────────────────────────
function editClient(id, e) {
  if (e) e.stopPropagation();
  const c = clients.find(x=>x.id===id);
  if (!c) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Editar Visita';
  document.getElementById('f_nome').value = c.nome;
  document.getElementById('f_tel').value = c.tel || '';
  document.getElementById('f_estudas').value = c.estudas || '';
  document.getElementById('f_status').value = c.status;
  document.getElementById('f_endereco').value = c.endereco || '';
  document.getElementById('f_obs').value = c.obs || '';
  tempLat = c.lat; tempLng = c.lng;
  updateLocPreview();
  document.getElementById('pickingHint').style.display = 'none';
  document.getElementById('modalOverlay').classList.add('open');
}

// ─── DELETE ───────────────────────────────────────────────────────────────────
function deleteClient(id, e) {
  if (e) e.stopPropagation();
  const c = clients.find(x=>x.id===id);
  if (!c) return;
  if (!confirm(`Remover "${c.nome}"?`)) return;
  if (markers[id]) map.removeLayer(markers[id]);
  delete markers[id];
  clients = clients.filter(x=>x.id!==id);
  save();
  renderList();
  toast(`🗑️ "${c.nome}" removido.`, 'info');
}

// ─── LINKS ───────────────────────────────────────────────────────────────────
function openGoogleMaps(id, e) {
  if (e) e.stopPropagation();
  const c = clients.find(x=>x.id===id);
  if (!c?.lat) return;
  window.open(`https://www.google.com/maps?q=${c.lat},${c.lng}`, '_blank');
}

function copyLink(id, e) {
  if (e) e.stopPropagation();
  const c = clients.find(x=>x.id===id);
  if (!c?.lat) return;
  const link = `https://www.google.com/maps?q=${c.lat},${c.lng}`;
  navigator.clipboard.writeText(link).then(() => {
    toast('🔗 Link copiado! Abra no Google Maps.', 'success');
  }).catch(() => {
    prompt('Copie o link:', link);
  });
}

// ─── LOCATE ME ────────────────────────────────────────────────────────────────
function locateMe() {
  if (!navigator.geolocation) { toast('Geolocalização não suportada.', 'error'); return; }
  toast('📍 Obtendo localização...', 'info');
  navigator.geolocation.getCurrentPosition(pos => {
    map.flyTo([pos.coords.latitude, pos.coords.longitude], 16);
    toast('📍 Localização encontrada!', 'success');
  }, () => toast('Não foi possível obter a localização.', 'error'));
}

// ─── EXPORT ───────────────────────────────────────────────────────────────────
function exportData() {
  const rows = ['Nome,Telefone,Estudas,Status,Endereço,Observações,Latitude,Longitude,Link Google Maps'];
  clients.forEach(c => {
    const link = c.lat ? `https://www.google.com/maps?q=${c.lat},${c.lng}` : '';
    rows.push([c.nome,c.tel||'',c.estudas||'',STATUS[c.status]?.label||c.status,
      c.endereco||'',c.obs||'',c.lat||'',c.lng||'',link]
      .map(v=>`"${String(v).replace(/"/g,'""')}"`)
      .join(','));
  });
  const blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `visitapro_${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  toast('📤 Dados exportados!', 'success');
}

// ─── STORAGE ──────────────────────────────────────────────────────────────────
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(clients));
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function toast(msg, type='info') {
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderList();
renderMarkers();
if (clients.length > 0) {
  const hasCoords = clients.filter(c=>c.lat);
  if (hasCoords.length) {
    const bounds = L.latLngBounds(hasCoords.map(c=>[c.lat,c.lng]));
    map.fitBounds(bounds, { padding: [40, 40] });
  }
}
</script>
</body>
